project_id = "millionmind"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000", "millionmind://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.apple]
enabled = false
client_id = ""
secret = "env(SUPABASE_AUTH_APPLE_SECRET)"

[auth.external.google]
enabled = false
client_id = ""
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.generate-numbers]
verify_jwt = true

[functions.revenuecat-webhook]
verify_jwt = false

[functions.refresh-stats]
verify_jwt = false

[functions.send-drawing-reminders]
verify_jwt = false

[functions.claim-rewarded-bonus]
verify_jwt = true

[functions.refresh-drawings]
verify_jwt = false

[analytics]
enabled = false
